<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验室专利知识库 - 登录</title>
    <link href=" https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css " rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">实验室专利与软著管理知识库</h3>
                        <p class="text-center text-muted">本科生毕业设计Demo系统</p>
                    </div>
                    <div class="card-body">
                        <!-- 登录表单 -->
                        <div id="loginForm">
                            <h4 class="mb-4">登录</h4>
                            <div class="mb-3">
                                <label for="loginUsername" class="form-label">用户名/邮箱</label>
                                <input type="text" class="form-control" id="loginUsername" 
                                       placeholder="请输入用户名或邮箱">
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">密码</label>
                                <input type="password" class="form-control" id="loginPassword" 
                                       placeholder="请输入密码">
                            </div>
                            <button class="btn btn-primary w-100" onclick="doLogin()">登录</button>
                            <div class="text-center mt-3">
                                <a href="javascript:void(0)" onclick="showRegister()">没有账号？立即注册</a>
                            </div>
                        </div>
                        
                        <!-- 注册表单 -->
                        <div id="registerForm" style="display: none;">
                            <h4 class="mb-4">注册</h4>
                            <div class="mb-3">
                                <label for="regUsername" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="regUsername" 
                                       placeholder="请输入用户名">
                            </div>
                            <div class="mb-3">
                                <label for="regEmail" class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="regEmail" 
                                       placeholder="请输入邮箱">
                            </div>
                            <div class="mb-3">
                                <label for="regPassword" class="form-label">密码</label>
                                <input type="password" class="form-control" id="regPassword" 
                                       placeholder="密码至少6位">
                            </div>
                            <div class="mb-3">
                                <label for="regConfirmPassword" class="form-label">确认密码</label>
                                <input type="password" class="form-control" id="regConfirmPassword" 
                                       placeholder="请再次输入密码">
                            </div>
                            <button class="btn btn-success w-100" onclick="doRegister()">注册</button>
                            <div class="text-center mt-3">
                                <a href="javascript:void(0)" onclick="showLogin()">已有账号？返回登录</a>
                            </div>
                        </div>
                        
                        <!-- 消息提示 -->
                        <div id="messageBox" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/modules/login.js"></script>
</body>
</html>
